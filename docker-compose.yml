version: "3.9"

services:
  django-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brewnest-backend-prod
    env_file:
      - .env.prod
    volumes:
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "127.0.0.1:8000:8000"
    restart: always

