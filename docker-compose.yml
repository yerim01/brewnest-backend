version: "3.9"

services:
  django-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brewnest-backend-prod
    env_file:
      - .env.prod
    # ports:
    #   - "8000:8000"
    volumes:
      # - ./static:/app/staticfiles
      - ./static:/app/static
      - ./media:/app/media
      # - static_volume:/app/staticfiles
      # - media_volume:app/
    restart: always

  frontend-proxy:
    image: nginx:latest
    ports:
      - "80:80"
    # ports:
    #   - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/static:ro
      - ./media:/media:ro
    depends_on:
      - django-web
    restart: always
